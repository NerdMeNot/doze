# Build + unit-test doze core on every PR and push. This is the base safety net:
# it runs the existing `go test ./...` (fake-driver runtime tests, config, proxy,
# health, tui, …) on both Linux and macOS so a regression is caught before merge.
# The heavier end-to-end suite that boots real engine binaries is separate and
# gated behind the `integration` build tag (see integration.yml), so it does not
# run here. doze-sdk is a normal tagged dependency — plain single checkout.
name: test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race ./...
