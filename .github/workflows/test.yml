# Build + unit-test doze core on every PR and push. This is the base safety net:
# it runs the existing `go test ./...` (fake-driver runtime tests, config, proxy,
# health, tui, …) on both Linux and macOS so a regression is caught before merge.
# The heavier end-to-end suite that boots real engine binaries is separate and
# gated behind the `integration` build tag (see integration.yml), so it does not
# run here.
name: test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # While doze-sdk is pre-release, go.mod has `replace doze-sdk => ../doze-sdk`,
      # so the SDK is checked out as a sibling (same pattern as integration.yml and
      # doze-modules CI). Drop both once the SDK is tagged.
      - uses: actions/checkout@v4
        with: { path: doze }
      - uses: actions/checkout@v4
        with: { repository: doze-dev/doze-sdk, path: doze-sdk }
      - uses: actions/setup-go@v5
        with:
          go-version-file: doze/go.mod
      - name: Vet
        working-directory: doze
        run: go vet ./...
      - name: Test
        working-directory: doze
        run: go test -race ./...
